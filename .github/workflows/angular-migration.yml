name: Staged Angular migration

on:
  push:
    branches:
      - chore/modernize-angular-repository
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: franco

    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: chore/modernize-angular-repository

      - name: Detect completed migration
        id: version
        shell: bash
        run: |
          if grep -q '"@angular/core": "[~^]*22\.' package.json; then
            echo "complete=true" >> "$GITHUB_OUTPUT"
          else
            echo "complete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js 12
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "12.22.12"

      - name: Migrate Angular 11 to 12
        if: steps.version.outputs.complete != 'true'
        run: |
          npm install
          npx -p @angular/cli@12 ng update @angular/core@12 @angular/cli@12 --force --allow-dirty

      - name: Set up Node.js 14
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "14.21.3"

      - name: Migrate Angular 12 to 14
        if: steps.version.outputs.complete != 'true'
        run: |
          npx -p @angular/cli@13 ng update @angular/core@13 @angular/cli@13 --force --allow-dirty
          npx -p @angular/cli@14 ng update @angular/core@14 @angular/cli@14 --force --allow-dirty

      - name: Set up Node.js 16
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "16.20.2"

      - name: Migrate Angular 14 to 16
        if: steps.version.outputs.complete != 'true'
        run: |
          npx -p @angular/cli@15 ng update @angular/core@15 @angular/cli@15 --force --allow-dirty
          npx -p @angular/cli@16 ng update @angular/core@16 @angular/cli@16 --force --allow-dirty

      - name: Set up Node.js 18
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.8"

      - name: Migrate Angular 16 to 18
        if: steps.version.outputs.complete != 'true'
        run: |
          npx -p @angular/cli@17 ng update @angular/core@17 @angular/cli@17 --force --allow-dirty
          npx -p @angular/cli@18 ng update @angular/core@18 @angular/cli@18 --force --allow-dirty

      - name: Set up Node.js 20
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Migrate Angular 18 to 20
        if: steps.version.outputs.complete != 'true'
        run: |
          npx -p @angular/cli@19 ng update @angular/core@19 @angular/cli@19 --force --allow-dirty
          npx -p @angular/cli@20 ng update @angular/core@20 @angular/cli@20 --force --allow-dirty

      - name: Set up Node.js 22
        if: steps.version.outputs.complete != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"

      - name: Migrate Angular 20 to 22
        if: steps.version.outputs.complete != 'true'
        run: |
          npx -p @angular/cli@21 ng update @angular/core@21 @angular/cli@21 --force --allow-dirty
          npx -p @angular/cli@22 ng update @angular/core@22 @angular/cli@22 --force --allow-dirty
          npm install
          npm run build -- --configuration production

      - name: Commit migrated workspace
        if: steps.version.outputs.complete != 'true'
        working-directory: .
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add franco
          if git diff --cached --quiet; then
            echo "No migration changes were produced."
            exit 0
          fi
          git commit -m "build: migrate Angular workspace to version 22"
          git push
