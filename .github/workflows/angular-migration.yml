name: CI

on:
  push:
    branches: [master, chore/modernize-angular-repository]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: franco

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2
          cache: npm
          cache-dependency-path: franco/package-lock.json

      - name: Refresh dependency lockfile
        run: npm install --package-lock-only

      - name: Commit refreshed lockfile
        if: github.event_name == 'push' && github.ref_name == 'chore/modernize-angular-repository'
        run: |
          if ! git diff --quiet -- package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: refresh dependency lockfile"
            git push
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
